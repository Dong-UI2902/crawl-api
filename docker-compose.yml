services:
    # PHP Service (Chạy code Laravel)
    app:
        build:
            context: .
            dockerfile: Dockerfile
        container_name: laravel_app
        restart: unless-stopped
        working_dir: /var/www
        volumes:
            - .:/var/www
        networks:
            - app-network

    # Web Server (Nginx - Giúp truy cập web qua trình duyệt)
    webserver:
        image: nginx:alpine
        container_name: nginx_server
        restart: unless-stopped
        ports:
            - '${HTTP_PORT:-80}:80'
        volumes:
            - .:/var/www
            - ./nginx/conf.d:/etc/nginx/conf.d/:ro
        networks:
            - app-network

    mysql:
        image: mysql:8.0
        container_name: mysql
        restart: always
        environment:
            MYSQL_DATABASE: '${DB_DATABASE}'
            MYSQL_USER: '${DB_USERNAME}'
            MYSQL_PASSWORD: '${DB_PASSWORD}'
            MYSQL_ROOT_PASSWORD: '${DB_ROOT_PASSWORD}'
        ports:
            - '${DB_PORT:-3306}:3306'
        volumes:
            - ./mysql_data:/var/lib/mysql
        networks:
            - app-network

networks:
    app-network:
        driver: bridge
