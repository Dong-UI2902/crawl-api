services:
    # PHP Service (Chạy code Laravel)
    app:
        build:
            context: .
            dockerfile: Dockerfile
        container_name: laravel_app
        restart: unless-stopped
        working_dir: /var/www
        volumes:
            - .:/var/www
        networks:
            - app-network

    # Web Server (Nginx - Giúp truy cập web qua trình duyệt)
    webserver:
        image: nginx:alpine
        container_name: nginx_server
        restart: unless-stopped
        ports:
            - '${HTTP_PORT:-80}:80'
        volumes:
            - .:/var/www
            - ./nginx/conf.d:/etc/nginx/conf.d/:ro
        networks:
            - app-network

networks:
    app-network:
        driver: bridge
